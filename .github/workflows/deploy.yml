name: CI/CD Pipeline - Terraform & App Deployment

# 1. Nuevos eventos (Triggers)
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  terraform-deploy:
    name: 'Upload Image to ECR, Terraform Plan & Apply'
    runs-on: ubuntu-latest

    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Lógica mejorada para detectar si es un PR o un Push
      - name: Determinar Entorno (Test o Prod)
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "ENV_DIR=environments/prod" >> $GITHUB_ENV
            echo "Entorno seleccionado: PRODUCCIÓN"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "ENV_DIR=environments/test" >> $GITHUB_ENV
            echo "Entorno seleccionado: TESTING"
          fi

      - name: Configurar Credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

          # 1. Autenticarse en Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 2. Construir la imagen Docker, etiquetarla y subirla a ECR
      # Se usa el nombre del entorno (test o prod) para aislar las imágenes
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Ajusta "test-app-repo" al nombre real de tu repositorio si es diferente
          ECR_REPOSITORY: "test-app-repo" 
          IMAGE_TAG: "latest"
        run: |
          # Navegamos a la carpeta app donde está el Dockerfile
          cd app 
          
          # Construimos la imagen
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          # Subimos la imagen a AWS
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          echo "Imagen subida exitosamente: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: ${{ env.ENV_DIR }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.ENV_DIR }}

      # El Plan se ejecuta siempre (sea Push o Pull Request)
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        working-directory: ${{ env.ENV_DIR }}

      # 3. La magia está aquí: El Apply SOLO se ejecuta si NO es un Pull Request
      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve -no-color
        working-directory: ${{ env.ENV_DIR }}