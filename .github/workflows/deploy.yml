name: CI/CD Pipeline - Terraform & App Deployment

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  terraform-deploy:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest

    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      # 1. Definimos dinámicamente el nombre del repositorio según la rama
      - name: Determinar Entorno (Test o Prod)
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "ENV_DIR=environments/prod" >> $GITHUB_ENV
            echo "REPO_NAME=prod-app-repo" >> $GITHUB_ENV
            echo "Entorno seleccionado: PRODUCCIÓN"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "ENV_DIR=environments/test" >> $GITHUB_ENV
            echo "REPO_NAME=test-app-repo" >> $GITHUB_ENV
            echo "Entorno seleccionado: TESTING"
          fi

      - name: Configurar Credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: ${{ env.ENV_DIR }}

      # --- LA MAGIA ESTÁ AQUÍ ---
      # 2. Le decimos a Terraform que cree SOLO el ECR antes que nada
      - name: Pre-crear Repositorio ECR
        run: terraform apply -target=module.ecr -auto-approve -no-color
        working-directory: ${{ env.ENV_DIR }}
      # ---------------------------

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 3. Ahora usamos la variable REPO_NAME para que funcione en Test y Prod
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.REPO_NAME }}
          IMAGE_TAG: "latest"
        run: |
          cd app
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Imagen subida exitosamente: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.ENV_DIR }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        working-directory: ${{ env.ENV_DIR }}

      # 4. Finalmente, se crea el resto de la infraestructura (VPC, RDS, ECS...)
      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve -no-color
        working-directory: ${{ env.ENV_DIR }}